services:

  db:
    container_name: postgres
    image: postgres:16
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=secret12345
      - POSTGRES_DB=my_datbase_db
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d labrat_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart : always
    networks:
      - api_network

  api:
    container_name : api
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: api-image:v1
    command: ["python", "main.py"]
    ports:
      - "8000:8000"
    networks:
      - api_network

  frontend:
    container_name : frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile  
    image: frontend-image:v1
    command: ["npm", "run" , "dev"]
    ports:
      - "5173:5173"
    networks:
      - api_network
    depends_on:
      - api
  redis:
    container_name : redis
    image: redis:latest
    restart : always
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - api_network


volumes:
  postgres-data:
    name : postgres_db
    driver : local
  redis-data:
    name : redis_volume
    driver: local
networks:
  api_network:
    driver: bridge
